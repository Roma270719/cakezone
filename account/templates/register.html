{% extends 'index.html' %}

{% block content %}
<div class="container-fluid contact position-relative px-5" style="margin-top: 90px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <form method="post">
                    {% csrf_token %}
                    <div class="form-error text-danger mb-3">{{ form.non_field_errors }}</div>

                    <div class="row gy-4">
                        {% for field in form %}
                            <div class="col-12">
                                <label class="form-label text-dark" for="{{ field.id_for_label }}">
                                    {{ field.label }}:
                                </label>
                                {{ field }}
                                <div class="form-error text-danger small mt-1">{{ field.errors }}</div>
                            </div>
                        {% endfor %}
                    </div>
                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-primary px-5" style="height: 55px;">Register</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
